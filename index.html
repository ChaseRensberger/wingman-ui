<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Wingman UI - Theme Preview</title>
    <link href="/output.css" rel="stylesheet" />
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
  </head>
  <body class="bg-background min-h-screen" hx-boost="true">
    <!-- Header -->
    <div class="border-b border-border">
      <div
        class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between"
      >
        <div class="flex items-center gap-6">
          <h1 class="text-2xl font-bold tracking-tight text-foreground">
            Wingman UI
          </h1>
          <nav class="flex items-center gap-1">
            <a
              href="/"
              class="inline-flex items-center justify-center rounded-md px-3 py-1.5 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring{{ if eq .ActivePage "layout" }} bg-accent text-accent-foreground{{ else }} text-muted-foreground{{ end }}"
            >Layout</a>
            <a
              href="/components"
              class="inline-flex items-center justify-center rounded-md px-3 py-1.5 text-sm font-medium transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring{{ if eq .ActivePage "components" }} bg-accent text-accent-foreground{{ else }} text-muted-foreground{{ end }}"
            >Components</a>
          </nav>
        </div>
        <div class="flex items-center gap-2">
          <span
            class="inline-flex items-center rounded-md border border-transparent bg-primary px-2.5 py-0.5 text-xs font-semibold text-primary-foreground"
            >Theme Preview</span
          >
          <button
            onclick="toggleThemeEditor()"
            class="inline-flex items-center justify-center gap-2 rounded-md border border-input bg-background h-9 px-3 text-sm font-medium shadow-sm transition-colors hover:bg-accent hover:text-accent-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring"
            aria-label="Open theme editor"
          >
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m19 11-8-8-8.6 8.6a2 2 0 0 0 0 2.8l5.2 5.2c.8.8 2 .8 2.8 0L19 11Z"/><path d="m5 2 5 5"/><path d="M2 13h15"/><path d="M22 20a2 2 0 1 1-4 0c0-1.6 1.7-2.4 2-4 .3 1.6 2 2.4 2 4Z"/></svg>
            Customize
          </button>
        </div>
      </div>
    </div>

    <div class="max-w-7xl mx-auto px-6 py-8">
      {{ if eq .ActivePage "layout" }}
        {{ template "layout-page" . }}
      {{ else if eq .ActivePage "components" }}
        {{ template "components-page" . }}
      {{ end }}
    </div>

    {{ template "theme-editor" . }}
  </body>
</html>
