{{ define "checkbox-showcase" }}
<div class="space-y-6">
  <!-- Basic Checkboxes -->
  <div class="space-y-3">
    <div class="flex items-center space-x-2">
      <input id="checkbox-terms" type="checkbox" class="peer h-4 w-4 shrink-0 rounded-sm border border-primary bg-transparent shadow-sm transition-colors checked:bg-primary checked:border-primary checked:text-primary-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 accent-primary" />
      <label for="checkbox-terms" class="text-sm font-medium leading-none cursor-pointer peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
        Accept terms and conditions
      </label>
    </div>

    <div class="flex items-center space-x-2">
      <input id="checkbox-emails" type="checkbox" checked class="peer h-4 w-4 shrink-0 rounded-sm border border-primary bg-transparent shadow-sm transition-colors checked:bg-primary checked:border-primary checked:text-primary-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 accent-primary" />
      <label for="checkbox-emails" class="text-sm font-medium leading-none cursor-pointer peer-disabled:cursor-not-allowed peer-disabled:opacity-70">
        Receive marketing emails
      </label>
    </div>

    <div class="flex items-center space-x-2">
      <input id="checkbox-disabled" type="checkbox" disabled class="peer h-4 w-4 shrink-0 rounded-sm border border-primary bg-transparent shadow-sm transition-colors checked:bg-primary checked:border-primary focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 accent-primary" />
      <label for="checkbox-disabled" class="text-sm font-medium leading-none cursor-not-allowed opacity-70">
        Disabled checkbox
      </label>
    </div>
  </div>

  <!-- Checkbox with Description -->
  <div class="space-y-3">
    <div class="flex items-start space-x-2">
      <input id="checkbox-mobile" type="checkbox" class="peer mt-0.5 h-4 w-4 shrink-0 rounded-sm border border-primary bg-transparent shadow-sm transition-colors checked:bg-primary checked:border-primary focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring accent-primary" />
      <div class="space-y-1 leading-none">
        <label for="checkbox-mobile" class="text-sm font-medium leading-none cursor-pointer">Mobile push notifications</label>
        <p class="text-xs text-muted-foreground">Send push notifications to your mobile device.</p>
      </div>
    </div>
  </div>
</div>
{{ end }}
