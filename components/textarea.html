{{ define "textarea-showcase" }}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl">
  <!-- Default Textarea -->
  <div class="space-y-2">
    <label for="textarea-default" class="text-sm font-medium leading-none">Message</label>
    <textarea id="textarea-default" placeholder="Type your message here..." rows="4" class="flex min-h-[60px] w-full rounded-md border border-input bg-transparent px-3 py-2 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 resize-none"></textarea>
  </div>

  <!-- Textarea with Description -->
  <div class="space-y-2">
    <label for="textarea-bio" class="text-sm font-medium leading-none">Bio</label>
    <textarea id="textarea-bio" placeholder="Tell us about yourself..." rows="4" class="flex min-h-[60px] w-full rounded-md border border-input bg-transparent px-3 py-2 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 resize-none"></textarea>
    <p class="text-xs text-muted-foreground">You can use markdown in your bio. Max 160 characters.</p>
  </div>

  <!-- Disabled Textarea -->
  <div class="space-y-2 md:col-span-2">
    <label for="textarea-disabled" class="text-sm font-medium leading-none opacity-70">Disabled</label>
    <textarea id="textarea-disabled" placeholder="This textarea is disabled..." rows="3" disabled class="flex min-h-[60px] w-full rounded-md border border-input bg-transparent px-3 py-2 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50 resize-none"></textarea>
  </div>
</div>
{{ end }}
