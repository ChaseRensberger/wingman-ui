{{ define "input-showcase" }}
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-2xl">
  <!-- Default Input -->
  <div class="space-y-2">
    <label for="input-email" class="text-sm font-medium leading-none peer-disabled:cursor-not-allowed peer-disabled:opacity-70">Email</label>
    <input id="input-email" type="email" placeholder="you@example.com" class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-base md:text-sm text-foreground shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" />
  </div>

  <!-- Password Input -->
  <div class="space-y-2">
    <label for="input-password" class="text-sm font-medium leading-none">Password</label>
    <input id="input-password" type="password" placeholder="Enter password" class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" />
  </div>

  <!-- Input with Description -->
  <div class="space-y-2">
    <label for="input-username" class="text-sm font-medium leading-none">Username</label>
    <input id="input-username" type="text" placeholder="wingman" class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" />
    <p class="text-xs text-muted-foreground">This is your public display name.</p>
  </div>

  <!-- Disabled Input -->
  <div class="space-y-2">
    <label for="input-disabled" class="text-sm font-medium leading-none opacity-70">Disabled</label>
    <input id="input-disabled" type="text" placeholder="Can't touch this" disabled class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" />
  </div>

  <!-- Input with Button -->
  <div class="space-y-2 md:col-span-2">
    <label for="input-subscribe" class="text-sm font-medium leading-none">Subscribe</label>
    <div class="flex gap-2">
      <input id="input-subscribe" type="email" placeholder="you@example.com" class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-base md:text-sm text-foreground shadow-sm transition-colors placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" />
      <button class="inline-flex items-center justify-center whitespace-nowrap rounded-md bg-primary h-9 px-4 py-2 text-sm font-medium text-primary-foreground shadow-sm transition-colors hover:bg-primary/90 focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring">Subscribe</button>
    </div>
  </div>

  <!-- File Input -->
  <div class="space-y-2 md:col-span-2">
    <label for="input-file" class="text-sm font-medium leading-none">Upload</label>
    <input id="input-file" type="file" class="flex h-9 w-full rounded-md border border-input bg-transparent px-3 py-1 text-base md:text-sm text-foreground shadow-sm transition-colors file:border-0 file:bg-transparent file:text-sm file:font-medium file:text-foreground placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-1 focus-visible:ring-ring disabled:cursor-not-allowed disabled:opacity-50" />
  </div>
</div>
{{ end }}
