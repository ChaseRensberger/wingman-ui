{{ define "alert-showcase" }}
<div class="space-y-4 max-w-2xl">
  <!-- Default Alert -->
  <div role="alert" class="relative w-full rounded-lg border border-border bg-background p-4 [&>svg]:absolute [&>svg]:left-4 [&>svg]:top-4 [&>svg]:text-foreground [&>svg~*]:pl-7">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
    <h5 class="mb-1 font-medium leading-none tracking-tight">Heads up!</h5>
    <p class="text-sm text-muted-foreground">You can add components to your app using the CLI.</p>
  </div>

  <!-- Destructive Alert -->
  <div role="alert" class="relative w-full rounded-lg border border-destructive/50 bg-destructive/10 p-4 text-destructive [&>svg]:absolute [&>svg]:left-4 [&>svg]:top-4 [&>svg]:text-destructive [&>svg~*]:pl-7">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
    <h5 class="mb-1 font-medium leading-none tracking-tight">Error</h5>
    <p class="text-sm opacity-80">Your session has expired. Please log in again.</p>
  </div>

  <!-- Success Alert -->
  <div role="alert" class="relative w-full rounded-lg border border-primary/50 bg-primary/10 p-4 text-primary [&>svg]:absolute [&>svg]:left-4 [&>svg]:top-4 [&>svg]:text-primary [&>svg~*]:pl-7">
    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>
    <h5 class="mb-1 font-medium leading-none tracking-tight">Success</h5>
    <p class="text-sm opacity-80">Your changes have been saved successfully.</p>
  </div>
</div>
{{ end }}
